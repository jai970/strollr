kind = "web"
previewPath = "/"
title = "Strollr — Waitlist Landing Page"
version = "1.0.0"
id = "artifacts/strollr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25749

[services.development]
run = "pnpm --filter @workspace/strollr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/strollr", "run", "build" ]
publicDir = "artifacts/strollr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25749"
BASE_PATH = "/"
